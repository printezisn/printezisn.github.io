<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="dialogGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#e94560" opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#533483" opacity="0.08"/>
  
  <!-- Dialog element representation -->
  <g transform="translate(350, 120)">
    <!-- Dialog box -->
    <rect x="0" y="0" width="500" height="350" rx="16" fill="url(#dialogGrad)" stroke="#e94560" stroke-width="2" filter="url(#glow)"/>
    
    <!-- Dialog header -->
    <rect x="0" y="0" width="500" height="50" rx="16" fill="#e94560" opacity="0.9"/>
    <rect x="0" y="34" width="500" height="16" fill="#1a1a2e" opacity="0.3"/>
    
    <!-- Close button -->
    <circle cx="460" cy="25" r="12" fill="white" opacity="0.9"/>
    <text x="460" y="30" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold">✕</text>
    
    <!-- Dialog title -->
    <text x="30" y="33" fill="white" font-size="18" font-weight="600" font-family="system-ui, sans-serif">dialog</text>
    
    <!-- Content lines -->
    <rect x="30" y="80" width="440" height="8" rx="4" fill="white" opacity="0.15"/>
    <rect x="30" y="105" width="380" height="8" rx="4" fill="white" opacity="0.1"/>
    <rect x="30" y="130" width="400" height="8" rx="4" fill="white" opacity="0.1"/>
    
    <!-- Code snippet area -->
    <rect x="30" y="170" width="440" height="120" rx="8" fill="#0a0a1a" opacity="0.6"/>
    <text x="50" y="205" fill="#e94560" font-size="14" font-family="monospace">&lt;dialog open&gt;</text>
    <text x="50" y="230" fill="#a8d8ea" font-size="14" font-family="monospace">  transition-behavior:</text>
    <text x="50" y="255" fill="#a8d8ea" font-size="14" font-family="monospace">    allow-discrete;</text>
    <text x="50" y="290" fill="#e94560" font-size="14" font-family="monospace">&lt;/dialog&gt;</text>
    
    <!-- Popover target button -->
    <rect x="140" y="315" width="220" height="30" rx="15" fill="#e94560" opacity="0.8"/>
    <text x="250" y="335" text-anchor="middle" fill="white" font-size="13" font-weight="600" font-family="system-ui, sans-serif">popovertarget="myDialog"</text>
  </g>
  
  <!-- Floating tags -->
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#e94560" opacity="0.2"/>
    <text x="60" y="24" text-anchor="middle" fill="#e94560" font-size="14" font-weight="600" font-family="system-ui, sans-serif">&lt;dialog&gt;</text>
  </g>
  <g transform="translate(190, 480)">
    <rect x="0" y="0" width="200" height="36" rx="18" fill="#533483" opacity="0.3"/>
    <text x="100" y="24" text-anchor="middle" fill="#c9a0dc" font-size="14" font-weight="600" font-family="system-ui, sans-serif">allow-discrete</text>
  </g>
  <g transform="translate(410, 480)">
    <rect x="0" y="0" width="180" height="36" rx="18" fill="#0f3460" opacity="0.4"/>
    <text x="90" y="24" text-anchor="middle" fill="#a8d8ea" font-size="14" font-weight="600" font-family="system-ui, sans-serif">popovertarget</text>
  </g>
  <g transform="translate(610, 480)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#e94560" opacity="0.15"/>
    <text x="70" y="24" text-anchor="middle" fill="#e94560" font-size="14" font-weight="600" font-family="system-ui, sans-serif">Zero JS</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="580" text-anchor="middle" fill="white" font-size="28" font-weight="700" font-family="system-ui, sans-serif" opacity="0.9">Native HTML Dialog Animations — Zero JavaScript</text>
</svg>
